<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website with HTML & CSS</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-brand">Binar Academy</div>
      <div class="nav-links">
        <a href="#" class="nav-link">About</a>
        <a href="#" class="nav-link">Lessons</a>
        <a href="#" class="nav-link">Contact us</a>
      </div>
    </nav>

    <main class="main-content">
      <h1 class="main-title">HELLO WORLD<span class="red-dot">.</span></h1>
      <h2 class="subtitle">Let's learn to code</h2>

      <h2 class="lessons-title">Lessons</h2>

      <div class="lessons-grid">
        <div class="lesson-card html-css">
          <div class="lesson-icon">🌐</div>
          <div class="lesson-title">HTML & CSS</div>
          <div class="lesson-description">
            Learn the basics of web development
          </div>
        </div>

        <div class="lesson-card javascript">
          <div class="lesson-icon">🐘</div>
          <div class="lesson-title">JavaScript</div>
          <div class="lesson-description">
            Add interactivity to your websites
          </div>
        </div>

        <div class="lesson-card react">
          <div class="lesson-icon">💎</div>
          <div class="lesson-title">React</div>
          <div class="lesson-description">Build modern web applications</div>
        </div>

        <div class="lesson-card nodejs">
          <div class="lesson-icon">☕</div>
          <div class="lesson-title">Node.js</div>
          <div class="lesson-description">
            Backend development with JavaScript
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
