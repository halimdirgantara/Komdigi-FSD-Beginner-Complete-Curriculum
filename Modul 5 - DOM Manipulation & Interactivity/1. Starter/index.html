<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do List - DOM Manipulation Practice</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>To-Do List</h1>
        <p>Kelola tugas Anda dengan mudah</p>
      </header>

      <main>
        <div class="todo-app">
          <!-- Add Task Form -->
          <form id="todoForm" class="todo-form">
            <div class="input-group">
              <input
                type="text"
                id="todoInput"
                placeholder="Masukkan tugas baru..."
                required
              />
              <button type="submit" id="addBtn">Tambah</button>
            </div>
          </form>

          <!-- Filter Buttons -->
          <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Semua</button>
            <button class="filter-btn" data-filter="active">Aktif</button>
            <button class="filter-btn" data-filter="completed">Selesai</button>
          </div>

          <!-- Todo List -->
          <div class="todo-list-container">
            <ul id="todoList" class="todo-list">
              <!-- TODO: Tasks will be added here by JavaScript -->
            </ul>
          </div>

          <!-- Stats -->
          <div class="todo-stats">
            <span id="taskCount">0 tugas</span>
            <button id="clearCompleted" class="clear-btn">Hapus Selesai</button>
          </div>
        </div>
      </main>
    </div>

    <!-- TODO: Tambahkan JavaScript di sini -->
    <script src="script.js"></script>
  </body>
</html>
